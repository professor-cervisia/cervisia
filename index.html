 #cheers-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.cheers-text {
  color: #33ff33;
  font-family: 'Courier New', monospace;
  font-size: 80px;
  letter-spacing: 8px;
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); opacity: 0.8; }
  to   { transform: scale(1.1); opacity: 1; }
}

#fireworks {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
} 
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; background: #000; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    @keyframes flicker {
      0%,100% { opacity:1 }
      91%      { opacity:1 }
      92%      { opacity:.97 }
      93%      { opacity:1 }
      97%      { opacity:.99 }
    }

    #terminal {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      color: #33ff33;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.7;
      padding: 22px 20px 14px;
      overflow: hidden;
      animation: flicker 9s infinite;
      position: relative;
    }

    #terminal::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 50;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding-right: 2px;
    }
    #output::-webkit-scrollbar { display: none; }

    .line {
      min-height: 1.7em;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .dim    { color: #1e9e1e; }
    .bright { color: #88ff88; font-weight: bold; }
    .err    { color: #ff3c3c; }
    .warn   { color: #ffaa00; }
    .sep    { color: #1e9e1e; letter-spacing: 1px; }
    .echo   { color: #55cc55; }
    .sys    { color: #00cccc; }

    #ok-btn {
      display: none;
      margin: 10px 0 4px;
      background: transparent;
      border: 1px solid #33ff33;
      color: #33ff33;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      padding: 6px 22px;
      cursor: pointer;
      letter-spacing: 2px;
    }
    #ok-btn:hover { background: #33ff3322; }
    #ok-btn:active { background: #33ff3344; }

    #prompt-area {
      display: none;
      align-items: center;
      gap: 6px;
      padding-top: 6px;
      flex-shrink: 0;
    }

    #input-field {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #33ff33;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.7;
      caret-color: transparent;
      min-width: 0;
    }
    #input-field::selection { background: rgba(51,255,51,.2); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    #cursor {
      display: inline-block;
      width: 9px;
      height: 1em;
      background: #33ff33;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      flex-shrink: 0;
    }

    #prompt-label { color: #1e9e1e; user-select: none; white-space: nowrap; }

    .img-label { color: #1e9e1e; font-size: 12px; margin-bottom: 4px; }

    .capture-image {
      display: block;
      max-width: 100%;
      border: 1px solid #1e9e1e;
      filter: grayscale(100%) brightness(0.85) contrast(1.15);
    }

    @media (max-width: 480px) {
      #terminal { font-size: 13px; padding: 14px 13px 10px; }
    }
  </style>

function startCheers() {
  const cheersScreen = document.getElementById('cheers-screen');
  const audio = document.getElementById('cheers-audio');

  if (cheersScreen) cheersScreen.style.display = 'flex';

  if (audio) {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  startFireworks();
}

let fireworksStarted = false;

function startFireworks() {
  if (fireworksStarted) return;
  fireworksStarted = true;

  const canvas = document.getElementById('fireworks');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const particles = [];

  function createExplosion(x, y) {
    for (let i = 0; i < 80; i++) {
      particles.push({
        x,
        y,
        dx: (Math.random() - 0.5) * 6,
        dy: (Math.random() - 0.5) * 6,
        life: 100
      });
    }
  }

  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.dx;
      p.y += p.dy;
      p.life -= 1;

      ctx.fillStyle = '#33ff33';
      ctx.fillRect(p.x, p.y, 2, 2);

      if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(animate);
  }

  setInterval(() => {
    createExplosion(
      Math.random() * canvas.width,
      Math.random() * (canvas.height / 2)
    );
  }, 600);

  animate();
}

function playOpenSound() {
  const audio = document.getElementById('open-audio');
  if (!audio) return;

  audio.pause();
  audio.currentTime = 0;

  audio.play().catch(() => {
    console.log('Open-geluid kon niet automatisch worden afgespeeld.');
  });
}

const outputEl   = document.getElementById('output');
const promptArea = document.getElementById('prompt-area');
const inputField = document.getElementById('input-field');

let currentInput = null;
let skipTyping   = false;
let isTyping     = false;

function sleep(ms) {
  return new Promise(res => setTimeout(res, ms));
}

function scrollDown() {
  outputEl.scrollTop = outputEl.scrollHeight;
}

function addLine(text, cls) {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text || '\u00A0';
  outputEl.appendChild(div);
  scrollDown();
  return div;
}

async function typeLine(text, cls, charDelay) {
  charDelay = charDelay ?? 25;
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = '\u00A0';
  outputEl.appendChild(div);
  isTyping = true;
  for (let i = 0; i <= text.length; i++) {
    if (skipTyping) { div.textContent = text || '\u00A0'; break; }
    div.textContent = text.substring(0, i) || '\u00A0';
    scrollDown();
    if (i < text.length) await sleep(charDelay);
  }
  isTyping = false;
  return div;
}

async function showImage(src, label, alt) {
  const wrap = document.createElement('div');
  wrap.style.margin = '8px 0';

  const labelEl = document.createElement('div');
  labelEl.className = 'img-label';
  labelEl.textContent = label || '[ OPNAME GELADEN ]';

  const img = document.createElement('img');
  img.src = src;
  img.alt = alt || 'Opname';
  img.className = 'capture-image';

  wrap.appendChild(labelEl);
  wrap.appendChild(img);
  outputEl.appendChild(wrap);
  scrollDown();
}

async function runLines(lines) {
  skipTyping = false;
  for (const line of lines) {
    if (line.action) {
      await handleAction(line);
      continue;
    }
    if (line.delay && !skipTyping) await sleep(line.delay);
    if (!line.text) {
      addLine('');
    } else {
      await typeLine(line.text, line.cls || '');
    }
  }
  skipTyping = false;
}

async function handleAction(actionLine) {
  if (actionLine.action === 'show_ok_button') {
    const btn = document.createElement('button');
    btn.id = 'ok-btn';
    btn.textContent = '[ OK ]';
    btn.style.display = 'block';
    outputEl.appendChild(btn);
    scrollDown();
    btn.addEventListener('click', async () => {
      btn.style.display = 'none';
      await runScreen(actionLine.target);
    });
  }

  if (actionLine.action === 'show_image') {
    await showImage(actionLine.src, actionLine.label, actionLine.alt);
  }
}

async function showError(msg) {
  promptArea.style.display = 'none';
  await sleep(200);
  const lines = msg.split('\n');
  for (const l of lines) {
    await typeLine(l.trim(), 'err', 18);
    await sleep(80);
  }
  addLine('');
  promptArea.style.display = 'flex';
  inputField.value = '';
  inputField.focus();
  scrollDown();
}

async function runScreen(screenId) {
  const lines = SCREENS[screenId];
    if (['qr1', 'qr2', 'qr3', 'qr4', 'qr5', 'qr6'].includes(screenId)) {
    playOpenSound();
  }
  if (!lines) {
    addLine('FOUT: scherm niet gevonden: ' + screenId, 'err');
    return;
  }

  promptArea.style.display = 'none';
  currentInput = null;

  await runLines(lines);

  if (screenId === 'qr6') {
    setTimeout(startCheers, 5000);
  }

  const inputKey = screenId + '_input';
  if (SCREENS[inputKey]) {
    currentInput = { ...SCREENS[inputKey], wrongCount: 0 };
    promptArea.style.display = 'flex';
    inputField.value = '';
    setTimeout(() => inputField.focus(), 200);
    scrollDown();
  }
}

inputField.onkeydown = async (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  if (!currentInput) return;

  const inp = currentInput;
  const val = inputField.value.trim();

  if (inp.type === 'code') {
    addLine('>> ' + val, 'echo');
    inputField.value = '';

    if (val.toLowerCase() === inp.answer.toLowerCase()) {
      promptArea.style.display = 'none';
      currentInput = null;
      addLine('');
      await runScreen(inp.next);
    } else {
      inp.wrongCount = (inp.wrongCount || 0) + 1;
      const errIdx = Math.min(inp.wrongCount - 1, inp.errMessages.length - 1);
      await showError(inp.errMessages[errIdx]);
    }
  }
};

document.getElementById('terminal').addEventListener('click', () => {
  if (promptArea.style.display !== 'none') {
    inputField.focus();
  } else if (isTyping) {
    skipTyping = true;
  }
});

(function() {
  const params = new URLSearchParams(window.location.search);
  const start = params.get('scherm') || 'qr1';
  if (SCREENS[start]) {
    runScreen(start);
  } else {
    addLine('FOUT: onbekend startscherm "' + start + '"', 'err');
    addLine('Beschikbare schermen: qr1, qr2, qr3, qr4, qr5, qr6', 'dim');
  }
})();
</script>

  <div class="cheers-text">CHEERS!</div>
</div>

<canvas id="fireworks"></canvas>
<audio id="cheers-audio" src="cheers.mp3" preload="auto"></audio>
  <audio id="open-audio" src="Open.mp3" preload="auto"></audio>
